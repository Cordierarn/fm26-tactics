<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#e63946" stroke-width="1.5" opacity="0.6"/>
  <!-- Pitch outline -->
  <rect x="5" y="7" width="22" height="18" rx="1" fill="none" stroke="#1a5f2a" stroke-width="1"/>
  <rect x="5" y="7" width="22" height="18" rx="1" fill="#0d3016" opacity="0.8"/>
  <!-- Center line -->
  <line x1="16" y1="7" x2="16" y2="25" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <!-- Center circle -->
  <circle cx="16" cy="16" r="3.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="0.7" fill="rgba(255,255,255,0.6)"/>
  <!-- Penalty areas -->
  <rect x="5" y="11" width="6" height="10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <rect x="21" y="11" width="6" height="10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6"/>
  <!-- Ball -->
  <circle cx="16" cy="16" r="2.2" fill="#e63946" opacity="0.9"/>
</svg>
